services:
  web:
    build: .
    image: meal-prerp-website:prod
    ports:
      - target: 3010
        published: 3010
        mode: ingress
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=https://prep.paragu-ai.com
    restart: unless-stopped
    networks:
      - agent-net
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        # Router HTTP
        - "traefik.http.routers.prep-http.rule=Host(`prep.paragu-ai.com`)"
        - "traefik.http.routers.prep-http.entrypoints=web"
        - "traefik.http.routers.prep-http.service=prep-service"
        # Router HTTPS
        - "traefik.http.routers.prep.rule=Host(`prep.paragu-ai.com`)"
        - "traefik.http.routers.prep.entrypoints=websecure"
        - "traefik.http.routers.prep.tls=true"
        - "traefik.http.routers.prep.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.prep.service=prep-service"
        # Service
        - "traefik.http.services.prep-service.loadbalancer.server.port=3010"

networks:
  agent-net:
    external: true
